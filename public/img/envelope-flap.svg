<svg viewBox="0 0 400 600" xmlns="http://www.w3.org/2000/svg">
  <!--
    Top flap — same viewBox as envelope-back.svg so they align perfectly.
    In HTML, position this with position:absolute, top:0, left:0, width:100%.
    Animation: rotate on X axis around the top edge.
      transform-origin: center top (or "50% 0%")
      CSS: rotateX(-180deg) with perspective on parent
  -->
  <defs>
    <linearGradient id="flap-fill" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FEFCF8"/>
      <stop offset="100%" stop-color="#EDE7DC"/>
    </linearGradient>
    <!-- Back face of the flap (visible while it rotates) -->
    <linearGradient id="flap-inner" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#F0EBE1"/>
      <stop offset="100%" stop-color="#E8E2D6"/>
    </linearGradient>
    <filter id="flap-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0000001A"/>
    </filter>
    <filter id="paper-flap" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" seed="3" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="multiply" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- The top triangular flap -->
  <polygon
    points="0,0 400,0 200,282"
    fill="url(#flap-fill)"
    filter="url(#paper-flap)"
  />

  <!-- Subtle edge shadow to show it sits on top of the other panels -->
  <polygon
    points="0,0 400,0 200,282"
    fill="url(#flap-inner)"
    filter="url(#flap-shadow)"
    opacity="0"
  />

  <!-- Fold crease lines along the flap edges -->
  <line x1="1" y1="1" x2="200" y2="282" stroke="#C2B9AA" stroke-width="0.7" opacity="0.55"/>
  <line x1="399" y1="1" x2="200" y2="282" stroke="#C2B9AA" stroke-width="0.7" opacity="0.55"/>

  <!-- Top border edge -->
  <line x1="0" y1="0.5" x2="400" y2="0.5" stroke="#C4BAA8" stroke-width="0.8" opacity="0.7"/>
</svg>
